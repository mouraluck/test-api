name: Codex Review and Deploy
# NOTE: human-review gate active for High/Critical complexity PRs.

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex-review:
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    environment:
      name: test-env
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.CODEX_REVIEW_MODEL != '' && vars.CODEX_REVIEW_MODEL || 'gpt-5.3' }}
      HUMAN_REVIEWERS: ${{ vars.CODEX_HUMAN_REVIEWERS }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Validate required secret
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing secret OPENAI_API_KEY"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assign PR to author
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/assignees" \
            -X POST \
            -f assignees[]="${PR_AUTHOR}" || true

      - name: Collect structure and diff context
        id: context
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git ls-tree -r --name-only "$HEAD_SHA" > repo_tree.txt
          git diff --unified=3 "$BASE_SHA" "$HEAD_SHA" > pr.diff
          git diff --numstat "$BASE_SHA" "$HEAD_SHA" > pr.numstat

          head -c 120000 repo_tree.txt > repo_tree.trimmed.txt
          head -c 220000 pr.diff > pr.trimmed.diff

          inserted_lines=$(awk '{sum += $1} END {print sum + 0}' pr.numstat)
          if [ "$inserted_lines" -lt 200 ]; then
            under_200=true
            under_200_checkbox='[x]'
          else
            under_200=false
            under_200_checkbox='[ ]'
          fi

          {
            echo "inserted_lines=${inserted_lines}"
            echo "under_200=${under_200}"
            echo "under_200_checkbox=${under_200_checkbox}"
          } >> "$GITHUB_OUTPUT"

      - name: Build Codex prompt
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          INSERTED_LINES: ${{ steps.context.outputs.inserted_lines }}
          UNDER_200: ${{ steps.context.outputs.under_200 }}
        run: |
          cat > codex_prompt.md <<'PROMPT'
          You are doing PR code review.

          Review rules to follow strictly:
          PROMPT

          cat .github/review-standards/AI_REQUESTS_PATTERNS_ARCHIVE.md >> codex_prompt.md
          printf '\n\nComplexity scoring standard:\n\n' >> codex_prompt.md
          cat .github/review-standards/CODE_COMPLEXITY_MANIFESTO.md >> codex_prompt.md

          cat >> codex_prompt.md <<'PROMPT'

          Analyze the repository structure and the PR diff below.
          Prioritize correctness, regressions, security, and missing tests.

          Return only JSON (no markdown fence) with keys:
          - complexity_band: one of Low, Medium, High, Critical
          - why_md: markdown paragraph(s) explaining why
          - how_md: markdown bullets or short paragraphs explaining changes
          - findings_md: markdown findings (ordered by severity)
          - missing_tests_md: markdown bullets
          - suggested_fixes_md: markdown bullets
          - linear_task_url: url string or empty
          - how_to_check: command(s) to validate

          Requirements:
          - Be specific and reference file paths.
          - If no issues found, explicitly say "No blocking findings" and list residual risks.
          - Keep the output concise and actionable.

          PR title:
          PROMPT
          printf '%s\n' "$PR_TITLE" >> codex_prompt.md
          cat >> codex_prompt.md <<'PROMPT'

          PR body:
          PROMPT
          printf '%s\n' "$PR_BODY" >> codex_prompt.md
          cat >> codex_prompt.md <<'PROMPT'

          Inserted lines in diff:
          PROMPT
          printf '%s\n' "$INSERTED_LINES" >> codex_prompt.md
          cat >> codex_prompt.md <<'PROMPT'

          Is inserted lines < 200?
          PROMPT
          printf '%s\n' "$UNDER_200" >> codex_prompt.md
          cat >> codex_prompt.md <<'PROMPT'

          Repository structure (trimmed):
          PROMPT
          cat repo_tree.trimmed.txt >> codex_prompt.md

          cat >> codex_prompt.md <<'PROMPT'

          PR diff (trimmed):
          PROMPT
          cat pr.trimmed.diff >> codex_prompt.md

      - name: Request review from Codex
        id: review
        run: |
          call_openai() {
            local model="$1"
            jq -n \
              --arg model "$model" \
              --rawfile prompt codex_prompt.md \
              '{
                model: $model,
                input: [
                  {
                    role: "user",
                    content: [
                      {
                        type: "input_text",
                        text: $prompt
                      }
                    ]
                  }
                ]
              }' > openai_payload.json

            curl -sS https://api.openai.com/v1/responses \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -H "Content-Type: application/json" \
              -d @openai_payload.json > openai_response.json
          }

          call_openai "$OPENAI_MODEL"

          if jq -e '.error' openai_response.json > /dev/null; then
            error_message=$(jq -r '.error.message // "OpenAI API error"' openai_response.json)
            if echo "$error_message" | grep -qi "does not exist"; then
              echo "Model '$OPENAI_MODEL' unavailable. Retrying with 'gpt-5'."
              call_openai "gpt-5"
            fi
          fi

          if jq -e '.error' openai_response.json > /dev/null; then
            jq -r '.error.message // "OpenAI API error"' openai_response.json
            exit 1
          fi

          review_text=$(jq -r '
            .output_text //
            ([.output[]?.content[]? | select(.type == "output_text") | .text] | join("\n")) //
            "Codex did not return review text."
          ' openai_response.json)

          review_text=$(printf '%s' "$review_text" | head -c 80000)
          printf '%s' "$review_text" > codex_review_raw.txt

          if jq -e . codex_review_raw.txt >/dev/null 2>&1; then
            cp codex_review_raw.txt codex_review.json
          else
            sanitized=$(sed -e '1s/^```json[[:space:]]*//' -e '$s/```$//' codex_review_raw.txt)
            printf '%s' "$sanitized" > codex_review_sanitized.txt
            if jq -e . codex_review_sanitized.txt >/dev/null 2>&1; then
              cp codex_review_sanitized.txt codex_review.json
            else
              jq -n --arg raw "$review_text" '{
                complexity_band: "Medium",
                why_md: $raw,
                how_md: "-",
                findings_md: $raw,
                missing_tests_md: "-",
                suggested_fixes_md: "-",
                linear_task_url: "",
                how_to_check: "go test ./..."
              }' > codex_review.json
            fi
          fi

          complexity_band=$(jq -r '.complexity_band // "Medium"' codex_review.json)
          case "$(printf '%s' "$complexity_band" | tr '[:upper:]' '[:lower:]')" in
            low) complexity_band="Low" ;;
            medium) complexity_band="Medium" ;;
            high) complexity_band="High" ;;
            critical) complexity_band="Critical" ;;
            *) complexity_band="Medium" ;;
          esac

          {
            echo "complexity_band=${complexity_band}"
            echo "why_md<<WHY_EOF"
            jq -r '.why_md // ""' codex_review.json
            echo "WHY_EOF"
            echo "how_md<<HOW_EOF"
            jq -r '.how_md // ""' codex_review.json
            echo "HOW_EOF"
            echo "findings_md<<FINDINGS_EOF"
            jq -r '.findings_md // ""' codex_review.json
            echo "FINDINGS_EOF"
            echo "missing_tests_md<<MISSING_TESTS_EOF"
            jq -r '.missing_tests_md // ""' codex_review.json
            echo "MISSING_TESTS_EOF"
            echo "suggested_fixes_md<<SUGGESTED_FIXES_EOF"
            jq -r '.suggested_fixes_md // ""' codex_review.json
            echo "SUGGESTED_FIXES_EOF"
            echo "linear_task_url=$(jq -r '.linear_task_url // ""' codex_review.json)"
            echo "how_to_check<<CHECK_EOF"
            jq -r '.how_to_check // "go test ./..."' codex_review.json
            echo "CHECK_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish review action
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          COMPLEXITY_BAND: ${{ steps.review.outputs.complexity_band }}
          WHY_MD: ${{ steps.review.outputs.why_md }}
          HOW_MD: ${{ steps.review.outputs.how_md }}
          FINDINGS_MD: ${{ steps.review.outputs.findings_md }}
          MISSING_TESTS_MD: ${{ steps.review.outputs.missing_tests_md }}
          SUGGESTED_FIXES_MD: ${{ steps.review.outputs.suggested_fixes_md }}
          LINEAR_TASK_URL: ${{ steps.review.outputs.linear_task_url }}
          HOW_TO_CHECK: ${{ steps.review.outputs.how_to_check }}
          UNDER_200_CHECKBOX: ${{ steps.context.outputs.under_200_checkbox }}
          INSERTED_LINES: ${{ steps.context.outputs.inserted_lines }}
          HUMAN_REVIEWERS: ${{ env.HUMAN_REVIEWERS }}
        run: |
          gh pr edit "$PR_NUMBER" \
            --remove-label "complexity:low" \
            --remove-label "complexity:medium" \
            --remove-label "complexity:high" \
            --remove-label "complexity:critical" \
            --remove-label "needs-human-approval" || true

          band_label=$(echo "$COMPLEXITY_BAND" | tr '[:upper:]' '[:lower:]')
          gh pr edit "$PR_NUMBER" --add-label "complexity:${band_label}" || true

          mention_line=""
          if [ "$COMPLEXITY_BAND" = "High" ] || [ "$COMPLEXITY_BAND" = "Critical" ]; then
            gh pr edit "$PR_NUMBER" --add-label "needs-human-approval" || true
            if [ -n "$HUMAN_REVIEWERS" ]; then
              requested_mentions=""
              skipped_mentions=""
              failed_mentions=""
              IFS=',' read -ra reviewers <<< "$HUMAN_REVIEWERS"
              for r in "${reviewers[@]}"; do
                trimmed=$(echo "$r" | xargs)
                if [ -n "$trimmed" ]; then
                  if [ "$trimmed" = "$PR_AUTHOR" ]; then
                    skipped_mentions="$skipped_mentions @$trimmed"
                    continue
                  fi

                  if gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/requested_reviewers" \
                    -X POST \
                    -f reviewers[]="$trimmed" >/dev/null 2>&1; then
                    requested_mentions="$requested_mentions @$trimmed"
                  else
                    failed_mentions="$failed_mentions @$trimmed"
                  fi
                fi
              done

              if [ -n "$requested_mentions" ]; then
                mention_line="Additional human reviewer requested:$requested_mentions"
              elif [ -n "$failed_mentions" ]; then
                mention_line="Failed to request human reviewer(s):$failed_mentions"
              else
                mention_line="No eligible additional human reviewer to request."
              fi

              if [ -n "$skipped_mentions" ]; then
                mention_line="$mention_line (author skipped:$skipped_mentions)"
              fi
            else
              mention_line="Additional human reviewer required for High/Critical complexity (configure CODEX_HUMAN_REVIEWERS)."
            fi
          fi

          linear_value="$LINEAR_TASK_URL"
          if [ -z "$linear_value" ] || [ "$linear_value" = "null" ]; then
            linear_value="N/A"
          fi

          review_body=$(cat <<EOF
          Complexity: ${COMPLEXITY_BAND}
          Why? :thinking:

          ${WHY_MD}

          Linear Task
          ${linear_value}

          How? :technologist:

          ${HOW_MD}

          Review Notes
          ${FINDINGS_MD}

          Missing Tests
          ${MISSING_TESTS_MD}

          Suggested Fixes
          ${SUGGESTED_FIXES_MD}

          Important

          ${UNDER_200_CHECKBOX} This PR has less than 200 lines inserted (actual: ${INSERTED_LINES})

          How to check it?

          ${HOW_TO_CHECK}
          EOF
          )

          if [ -n "$mention_line" ]; then
            review_body="${review_body}\n\n${mention_line}"
          fi

          if [ "$COMPLEXITY_BAND" = "Low" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
              -X POST \
              -f event="APPROVE" \
              -f body="$review_body"
          else
            gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" \
              -X POST \
              -f event="COMMENT" \
              -f body="$review_body"
          fi

  deploy-on-command:
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request
    runs-on: ubuntu-latest
    environment:
      name: test-env
    env:
      COMMENT_BODY: ${{ github.event.comment.body }}
      AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      HUMAN_REVIEWERS: ${{ vars.CODEX_HUMAN_REVIEWERS }}
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Guard conditions
        id: guard
        run: |
          if [ "${COMMENT_BODY}" != ".deploy" ]; then
            echo "run_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$AUTHOR_ASSOCIATION" in
            OWNER|MEMBER|COLLABORATOR)
              ;;
            *)
              gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                -f body="Deploy ignored: only OWNER/MEMBER/COLLABORATOR can trigger .deploy"
              echo "run_deploy=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="Deploy failed: missing secret RENDER_DEPLOY_HOOK_URL"
            echo "run_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          needs_human=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name | select(. == "needs-human-approval")' || true)
          if [ "$needs_human" = "needs-human-approval" ]; then
            if [ -z "$HUMAN_REVIEWERS" ]; then
              gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                -f body="Deploy blocked: CODEX_HUMAN_REVIEWERS is not configured."
              echo "run_deploy=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            approved_logins=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/reviews" --jq '[.[] | select(.state=="APPROVED") | .user.login] | unique | .[]' || true)
            approval_ok=false
            IFS=',' read -ra reviewers <<< "$HUMAN_REVIEWERS"
            for r in "${reviewers[@]}"; do
              reviewer=$(echo "$r" | xargs)
              if [ -n "$reviewer" ] && echo "$approved_logins" | grep -qx "$reviewer"; then
                approval_ok=true
                break
              fi
            done

            if [ "$approval_ok" != "true" ]; then
              gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
                -f body="Deploy blocked: this PR requires approval from configured human reviewer(s) before deploy/merge."
              echo "run_deploy=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "run_deploy=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploy
        if: steps.guard.outputs.run_deploy == 'true'
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Confirm deploy trigger
        if: steps.guard.outputs.run_deploy == 'true'
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -f body="Deploy triggered on Render via .deploy command."

  deploy-and-merge-on-approval:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved' && github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    environment:
      name: test-env
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REVIEWER_LOGIN: ${{ github.event.review.user.login }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      HUMAN_REVIEWERS: ${{ vars.CODEX_HUMAN_REVIEWERS }}
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Verify approval gate
        id: gate
        run: |
          needs_human=$(gh pr view "$PR_NUMBER" --json labels --jq '.labels[].name | select(. == "needs-human-approval")' || true)
          if [ "$needs_human" != "needs-human-approval" ]; then
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$REVIEWER_LOGIN" = "$PR_AUTHOR" ]; then
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$HUMAN_REVIEWERS" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="Release blocked: CODEX_HUMAN_REVIEWERS is not configured."
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          reviewer_allowed=false
          IFS=',' read -ra reviewers <<< "$HUMAN_REVIEWERS"
          for r in "${reviewers[@]}"; do
            reviewer=$(echo "$r" | xargs)
            if [ -n "$reviewer" ] && [ "$reviewer" = "$REVIEWER_LOGIN" ]; then
              reviewer_allowed=true
              break
            fi
          done

          if [ "$reviewer_allowed" != "true" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="Release blocked: approval by @$REVIEWER_LOGIN is not in CODEX_HUMAN_REVIEWERS."
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              -f body="Release blocked: missing secret RENDER_DEPLOY_HOOK_URL."
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_release=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Render deploy
        if: steps.gate.outputs.run_release == 'true'
        run: |
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

      - name: Enable auto-merge
        if: steps.gate.outputs.run_release == 'true'
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash

      - name: Confirm release gate success
        if: steps.gate.outputs.run_release == 'true'
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -f body="Human approval by @$REVIEWER_LOGIN validated. Deploy triggered and auto-merge enabled."
